<title>Project Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  import sqlite3
import os

# ডাটাবেসের লোকেশন ঠিক করা
DB_PATH = 'database.db'

def init_db():
    # ফাইলটি যদি না থাকে, তবে তৈরি করবে
    conn = sqlite3.connect(DB_PATH)
    cursor = conn.cursor()
    # ইউজার টেবিল তৈরি করা
    cursor.execute('''CREATE TABLE IF NOT EXISTS users (
                        id INTEGER PRIMARY KEY AUTOINCREMENT, 
                        username TEXT NOT NULL, 
                        password TEXT NOT NULL)''')
    
    # প্রথমবার রান করলে 'admin' ইউজার তৈরি করে রাখা
    cursor.execute("INSERT OR IGNORE INTO users (username, password) VALUES (?, ?)", ('admin', 'admin123'))
    conn.commit()
    conn.close()

# অ্যাপ রান করার সময় ডাটাবেসটি রেডি করা
init_db()
  --bg:#0f0f13;--sidebar:#16161e;--card:#1e1e28;--card2:#252530;
  --accent:#7F77DD;--accent2:#534AB7;--border:rgba(255,255,255,0.08);
  --text:#e8e8f0;--muted:rgba(255,255,255,0.45);--muted2:rgba(255,255,255,0.25);
  --success:#4ade80;--success-bg:rgba(74,222,128,0.12);
  --warn:#fbbf24;--warn-bg:rgba(251,191,36,0.12);
  --danger:#f87171;--danger-bg:rgba(248,113,113,0.12);
  --paid:#34d399;--paid-bg:rgba(52,211,153,0.12);
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* Sidebar */
.sidebar{width:220px;min-height:100vh;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.sidebar-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border);}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-box{width:36px;height:36px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-box svg{width:20px;height:20px;}
.logo-text{font-size:15px;font-weight:700;color:var(--text);}
.logo-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--muted);font-size:13px;margin-bottom:2px;transition:all 0.15s;}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(127,119,221,0.2),rgba(83,74,183,0.15));color:var(--accent);font-weight:600;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--accent2);color:#fff;font-size:10px;padding:1px 6px;border-radius:99px;}
.sidebar-user{padding:14px;border-top:1px solid var(--border);}
.user-row{display:flex;align-items:center;gap:10px;}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:var(--text);}
.user-role{font-size:11px;color:var(--muted);}
.btn-logout{margin-top:8px;width:100%;padding:7px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);border-radius:var(--radius-sm);color:var(--danger);font-size:12px;cursor:pointer;}
.btn-logout:hover{background:rgba(248,113,113,0.2);}

/* Main */
.main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50;}
.topbar-title{font-size:18px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.content{padding:24px;flex:1;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.card.danger-border{border-color:rgba(248,113,113,0.4);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.stat-icon svg{width:18px;height:18px;}
.stat-val{font-size:26px;font-weight:700;line-height:1;}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;}

/* Buttons */
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;font-size:13px;cursor:pointer;font-weight:600;transition:all 0.15s;}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;}
.btn-primary:hover{opacity:0.9;}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(248,113,113,0.2);}
.btn-danger:hover{background:rgba(248,113,113,0.2);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:11px;}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;}
.badge-new{background:var(--danger-bg);color:var(--danger);}
.badge-prog{background:var(--warn-bg);color:var(--warn);}
.badge-done{background:var(--success-bg);color:var(--success);}
.badge-paid{background:var(--paid-bg);color:var(--paid);}
.badge-unpaid{background:var(--danger-bg);color:var(--danger);}
.badge-admin{background:rgba(127,119,221,0.15);color:var(--accent);}
.badge-viewer{background:rgba(255,255,255,0.06);color:var(--muted);}

/* Filter pills */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.pill{padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s;}
.pill:hover{border-color:var(--accent);color:var(--accent);}
.pill.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}

/* Project card */
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;transition:border-color 0.2s;}
.proj-card:hover{border-color:rgba(127,119,221,0.3);}
.proj-card.overdue{border-color:rgba(248,113,113,0.35);}
.proj-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.proj-name{font-size:15px;font-weight:700;color:var(--text);}
.proj-client{font-size:12px;color:var(--muted);margin-top:2px;}
.proj-meta{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;}
.proj-meta span{font-size:12px;color:var(--muted);}
.proj-meta span.overdue{color:var(--danger);font-weight:600;}
.path-row{display:flex;align-items:center;gap:8px;margin-top:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;}
.path-text{font-size:11px;color:var(--muted);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-copy{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;}
.btn-copy:hover,.btn-copy.copied{background:rgba(127,119,221,0.2);color:var(--accent);border-color:var(--accent);}
.btn-open{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid rgba(127,119,221,0.3);background:rgba(127,119,221,0.1);color:var(--accent);cursor:pointer;white-space:nowrap;font-weight:600;}
.btn-open:hover{background:rgba(127,119,221,0.2);}

/* Forms */
.form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;}
.form-overlay.open{display:flex;}
.form-modal{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;}
.form-title{font-size:17px;font-weight:700;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-full{grid-column:1/-1;}
.field-label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
.field-input{width:100%;padding:9px 12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);outline:none;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--muted2);}
select.field-input option{background:#1e1e28;}
.assign-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.assign-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:99px;cursor:pointer;font-size:12px;color:var(--muted);transition:all 0.15s;}
.assign-chip.selected{background:rgba(127,119,221,0.15);border-color:var(--accent);color:var(--accent);}
.form-actions{display:flex;gap:8px;margin-top:20px;}
.field-hint{font-size:11px;color:var(--muted2);margin-top:4px;}

/* User card */
.user-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;}
.user-card-top{display:flex;align-items:center;gap:12px;}
.user-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.user-info{flex:1;}
.user-card-name{font-size:14px;font-weight:700;}
.user-card-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.user-stats{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.user-stat{text-align:center;}
.user-stat-val{font-size:18px;font-weight:700;}
.user-stat-label{font-size:11px;color:var(--muted);}
.user-last-login{font-size:11px;color:var(--muted);margin-top:8px;}

/* Activity */
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:4px;flex-shrink:0;}
.activity-text{font-size:13px;color:var(--text);}
.activity-time{font-size:11px;color:var(--muted);margin-top:2px;}

/* Settings */
.settings-section{margin-bottom:28px;}
.settings-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.settings-row-label{font-size:13px;color:var(--text);}
.settings-row-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transition:all 0.3s;transform:translateY(80px);opacity:0;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-ok{background:#1a3a2a;color:var(--success);border:1px solid rgba(74,222,128,0.2);}
.toast-err{background:#3a1a1a;color:var(--danger);border:1px solid rgba(248,113,113,0.2);}

@media(max-width:700px){
  .sidebar{width:60px;}
  .sidebar-logo .logo-text,.sidebar-logo .logo-sub,.nav-item span,.sidebar-user .user-name,.sidebar-user .user-role{display:none;}
  .main{margin-left:60px;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .form-full{grid-column:1;}
}
</style>
</head>

<script>
let currentUser = null, currentFilter = 'all', editingProjectId = null;

async function api(url, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast toast-${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function init() {
  const r = await api('/api/me');
  if(!r.user) { window.location.href='/login'; return; }
  currentUser = r.user;
  document.getElementById('sidebarAvatar').textContent = r.user.name[0].toUpperCase();
  document.getElementById('sidebarName').textContent = r.user.name;
  document.getElementById('sidebarRole').textContent = r.user.role === 'admin' ? 'Admin' : 'Viewer';
  if(r.user.role !== 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display='none');
  }
  goTab('dashboard');
}

async function doLogout() {
  await api('/api/logout','POST');
  window.location.href = '/login';
}

function goTab(tab) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+tab);
  if(navEl) navEl.classList.add('active');
  const titles = {dashboard:'Dashboard',projects:'Projects',users:'Users',activity:'Activity Log',settings:'Settings'};
  document.getElementById('pageTitle').textContent = titles[tab] || tab;
  if(tab==='dashboard') renderDashboard();
  else if(tab==='projects') renderProjects();
  else if(tab==='users') renderUsers();
  else if(tab==='activity') renderActivity();
  else if(tab==='settings') renderSettings();
}

// ── Dashboard ───────────────────────────────────────────────
async function renderDashboard() {
  const [stats, pd] = await Promise.all([api('/api/stats'), api('/api/projects')]);
  const projects = pd.projects || [];
  const upcoming = projects.filter(p => p.status !== 'সম্পন্ন' && p.deadline).sort((a,b)=>a.deadline>b.deadline?1:-1).slice(0,3);
  document.getElementById('pending-badge').textContent = stats.pending || 0;
  document.getElementById('topbarRight').innerHTML = '';

  let statsHtml = '';
  if(currentUser.role==='admin') {
    statsHtml = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon" style="background:rgba(127,119,221,0.15)"><svg viewBox="0 0 24 24" fill="none" stroke="#7F77DD" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16h16V8z"/></svg></div><div class="stat-val">${stats.total||0}</div><div class="stat-label">মোট Projects</div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(74,222,128,0.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stat-val" style="color:#4ade80">${stats.done||0}</div><div class="stat-label">সম্পন্ন</div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(251,191,36,0.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-val" style="color:#fbbf24">${stats.pending||0}</div><div class="stat-label">চলছে / বাকি</div></div>
      <div class="stat-card"><div class="stat-icon" style="background:rgba(52,211,153,0.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="stat-val" style="color:#34d399">৳${(stats.paona||0).toLocaleString()}</div><div class="stat-label">মোট পাওনা</div></div>
    </div>`;
  } else {
    statsHtml = `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-val">${stats.total||0}</div><div class="stat-label">আমার Projects</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#4ade80">${stats.done||0}</div><div class="stat-label">সম্পন্ন</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#fbbf24">${stats.pending||0}</div><div class="stat-label">বাকি আছে</div></div>
    </div>`;
  }

  const upcomingHtml = upcoming.length ? upcoming.map(p => {
    const dl = new Date(p.deadline);
    const overdue = dl < new Date() && p.status!=='সম্পন্ন';
    const diff = Math.ceil((dl - new Date()) / 86400000);
    const diffText = overdue ? `${Math.abs(diff)} দিন দেরি!` : diff===0 ? 'আজকে!' : `${diff} দিন বাকি`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
      <div><div style="font-size:13px;font-weight:600;">${p.project}</div><div style="font-size:12px;color:var(--muted)">${p.client}</div></div>
      <span style="font-size:12px;color:${overdue?'var(--danger)':'var(--warn)'};">${diffText}</span>
    </div>`;
  }).join('') : '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">কোনো upcoming deadline নেই</div>';

  let actHtml = '';
  if(currentUser.role==='admin' && stats.logs) {
    actHtml = `<div class="card" style="margin-top:14px;"><div style="font-size:14px;font-weight:700;margin-bottom:14px;">সাম্প্রতিক Activity</div>
    ${stats.logs.slice(0,5).map(l=>`<div class="activity-item"><div class="activity-dot"></div><div><div class="activity-text">${l.name} — ${l.action}${l.detail?' ('+l.detail+')':''}</div><div class="activity-time">${new Date(l.timestamp).toLocaleString('bn-BD')}</div></div></div>`).join('')}
    </div>`;
  }

  document.getElementById('content').innerHTML = `
    ${statsHtml}
    <div style="display:grid;grid-template-columns:1fr${currentUser.role==='admin'?'':''};gap:14px;">
      <div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:14px;">আসন্ন Deadline</div>${upcomingHtml}</div>
    </div>
    ${actHtml}`;
}

// ── Projects ─────────────────────────────────────────────────
async function renderProjects() {
  const [pd, ud] = await Promise.all([api('/api/projects'), api('/api/users')]);
  let projects = pd.projects || [];
  const users = ud.users || [];
  const isAdmin = currentUser.role === 'admin';

  document.getElementById('pending-badge').textContent = projects.filter(p=>p.status!=='সম্পন্ন').length;
  document.getElementById('topbarRight').innerHTML = isAdmin
    ? `<button class="btn btn-primary" onclick="openAddProject()">+ Project যোগ</button>` : '';

  if(currentFilter !== 'all') projects = projects.filter(p=>p.status===currentFilter);

  const today = new Date();
  const cards = projects.length ? projects.map(p => {
    const overdue = p.deadline && new Date(p.deadline) < today && p.status !== 'সম্পন্ন';
    const sbMap = {'নতুন কাজ':'badge-new','চলছে':'badge-prog','সম্পন্ন':'badge-done'};
    const assignedNames = (p.assignedTo||[]).map(a=>a.name).join(', ');
    const dlFmt = p.deadline ? new Date(p.deadline).toLocaleDateString('bn-BD',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const pathSection = p.path ? `
      <div class="path-row">
        <span class="path-text" title="${p.path}">${p.path}</span>
        <button class="btn-open" onclick="openPath('${p.id}')">Folder খোলো</button>
        <button class="btn-copy" onclick="copyPath('${p.path}',this)">Copy</button>
      </div>` : '';
    const noteSection = p.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;">${p.notes}</div>` : '';
    return `
    <div class="proj-card${overdue?' overdue':''}">
      <div class="proj-top">
        <div>
          <div class="proj-name">${p.project}</div>
          <div class="proj-client">${p.client}${assignedNames&&isAdmin?' · '+assignedNames:''}</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <span class="badge ${sbMap[p.status]||'badge-new'}" ${isAdmin?`onclick="toggleStatus(${p.id})"`:''}>${p.status}</span>
          <span class="badge ${p.paid==='পেয়েছি'?'badge-paid':'badge-unpaid'}" ${isAdmin?`onclick="togglePaid(${p.id})"`:''}>${p.paid}</span>
          ${isAdmin?`<button class="btn btn-ghost btn-xs" onclick="openEditProject(${p.id})">Edit</button>
          <button class="btn btn-danger btn-xs" onclick="deleteProject(${p.id})">বাদ</button>`:''}
        </div>
      </div>
      <div class="proj-meta">
        <span class="${overdue?'overdue':''}">📅 ${dlFmt}${overdue?' ⚠ দেরি!':''}</span>
        ${isAdmin?`<span>৳ ${(p.payment||0).toLocaleString()}</span>`:''}
        ${p.paid==='পেয়েছি'?'<span style="color:var(--paid)">✓ Payment পেয়েছি</span>':''}
      </div>
      ${noteSection}${pathSection}
    </div>`;
  }).join('') : `<div style="text-align:center;padding:60px;color:var(--muted);">কোনো project নেই।</div>`;

  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <div class="filter-row">
        ${['all','নতুন কাজ','চলছে','সম্পন্ন'].map((f,i)=>`<button class="pill${currentFilter===f?' active':''}" onclick="setFilter('${f}')">${['সব','নতুন কাজ','চলছে','সম্পন্ন'][i]}</button>`).join('')}
      </div>
    </div>
    ${cards}`;
}

function setFilter(f) { currentFilter=f; renderProjects(); }

async function openAddProject() {
  editingProjectId = null;
  document.getElementById('modalTitle').textContent = 'নতুন Project যোগ করো';
  document.getElementById('fp-client').value=''; document.getElementById('fp-project').value='';
  document.getElementById('fp-deadline').value=''; document.getElementById('fp-payment').value='';
  document.getElementById('fp-path').value=''; document.getElementById('fp-notes').value='';
  document.getElementById('fp-status').value='নতুন কাজ'; document.getElementById('fp-paid').value='বাকি';
  await loadAssignGrid();
  document.getElementById('projectModal').classList.add('open');
}

async function openEditProject(pid) {
  editingProjectId = pid;
  document.getElementById('modalTitle').textContent = 'Project Edit করো';
  const pd = await api('/api/projects');
  const p = (pd.projects||[]).find(x=>x.id===pid); if(!p) return;
  document.getElementById('fp-client').value=p.client||'';
  document.getElementById('fp-project').value=p.project||'';
  document.getElementById('fp-deadline').value=p.deadline||'';
  document.getElementById('fp-payment').value=p.payment||'';
  document.getElementById('fp-path').value=p.path||'';
  document.getElementById('fp-notes').value=p.notes||'';
  document.getElementById('fp-status').value=p.status||'নতুন কাজ';
  document.getElementById('fp-paid').value=p.paid||'বাকি';
  const assignedIds = (p.assignedTo||[]).map(a=>a.id);
  await loadAssignGrid(assignedIds);
  document.getElementById('projectModal').classList.add('open');
}

async function loadAssignGrid(selected=[]) {
  const ud = await api('/api/users');
  const viewers = (ud.users||[]).filter(u=>u.role==='viewer');
  document.getElementById('assignGrid').innerHTML = viewers.map(u=>`
    <div class="assign-chip${selected.includes(u.id)?' selected':''}" onclick="this.classList.toggle('selected')" data-uid="${u.id}">${u.name}</div>`).join('');
}

async function saveProject() {
  const client=document.getElementById('fp-client').value.trim();
  const project=document.getElementById('fp-project').value.trim();
  if(!client||!project){toast('Client ও project নাম দাও','err');return;}
  const assigned=[...document.querySelectorAll('.assign-chip.selected')].map(el=>parseInt(el.dataset.uid));
  const body={client,project,deadline:document.getElementById('fp-deadline').value,
    payment:parseInt(document.getElementById('fp-payment').value)||0,
    status:document.getElementById('fp-status').value,paid:document.getElementById('fp-paid').value,
    path:document.getElementById('fp-path').value.trim(),notes:document.getElementById('fp-notes').value.trim(),
    assignedTo:assigned};
  const url = editingProjectId ? '/api/projects/update' : '/api/projects/add';
  if(editingProjectId) body.id = editingProjectId;
  const r = await api(url,'POST',body);
  if(r.ok){closeModal();toast(editingProjectId?'Project update হয়েছে!':'Project যোগ হয়েছে!');renderProjects();}
  else toast(r.error||'ভুল হয়েছে','err');
}

function closeModal(){document.getElementById('projectModal').classList.remove('open');}

async function toggleStatus(id){await api('/api/projects/toggle-status','POST',{id});renderProjects();}
async function togglePaid(id){await api('/api/projects/toggle-paid','POST',{id});renderProjects();}
async function deleteProject(id){
  if(!confirm('এই project বাদ দেবে?'))return;
  const r=await api('/api/projects/delete','POST',{id});
  if(r.ok){toast('Project বাদ দেওয়া হয়েছে।');renderProjects();}
}

function copyPath(path, btn) {
  navigator.clipboard.writeText(path).catch(()=>{
    const t=document.createElement('textarea');t.value=path;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
  });
  btn.textContent='Copied!'; btn.classList.add('copied');
  setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
}

function openPath(id) {
  // For web app, copy path and show instructions
  api('/api/projects').then(pd=>{
    const p=(pd.projects||[]).find(x=>x.id==id);
    if(p&&p.path){
      navigator.clipboard.writeText(p.path).catch(()=>{});
      toast('Path copy হয়েছে! File Explorer-এ Ctrl+L দিয়ে paste করো');
    }
  });
}

// ── Users ────────────────────────────────────────────────────
async function renderUsers() {
  const ud = await api('/api/users');
  const users = ud.users||[];
  document.getElementById('topbarRight').innerHTML = `<button class="btn btn-primary" onclick="document.getElementById('userModal').classList.add('open')">+ User যোগ</button>`;
  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:16px;font-size:13px;color:var(--muted);">${users.length} জন user আছে</div>
    ${users.map(u=>`
    <div class="user-card">
      <div class="user-card-top">
        <div class="user-av">${u.name[0].toUpperCase()}</div>
        <div class="user-info">
          <div class="user-card-name">${u.name}</div>
          <div class="user-card-meta">@${u.username} &nbsp;·&nbsp; Password: ${u.role==='admin'?'(hidden)':'<span style="font-family:monospace">***</span>'}</div>
        </div>
        <span class="badge badge-${u.role==='admin'?'admin':'viewer'}" style="margin-left:auto">${u.role}</span>
        ${u.id!==currentUser.id?`
        <button class="btn btn-ghost btn-sm" onclick="resetUserPass(${u.id},'${u.name}')">Reset Pass</button>
        <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">বাদ</button>`
        :`<span style="font-size:11px;color:var(--muted);margin-left:8px;">(তুমি)</span>`}
      </div>
      <div class="user-stats">
        <div class="user-stat"><div class="user-stat-val">${u.project_count}</div><div class="user-stat-label">Projects</div></div>
        <div class="user-stat"><div class="user-stat-val" style="color:#4ade80">${u.done_count}</div><div class="user-stat-label">সম্পন্ন</div></div>
        <div class="user-stat"><div class="user-stat-val" style="color:#fbbf24">${(u.project_count||0)-(u.done_count||0)}</div><div class="user-stat-label">বাকি</div></div>
      </div>
      ${u.last_login?`<div class="user-last-login">শেষ login: ${new Date(u.last_login).toLocaleString('bn-BD')}${u.pc_name?' · '+u.pc_name:''}</div>`:'<div class="user-last-login" style="color:var(--muted2)">এখনো login করেনি</div>'}
    </div>`).join('')}`;
}

async function saveUser() {
  const name=document.getElementById('fu-name').value.trim();
  const username=document.getElementById('fu-username').value.trim();
  const password=document.getElementById('fu-pass').value.trim();
  const role=document.getElementById('fu-role').value.includes('viewer')?'viewer':'admin';
  if(!name||!username||!password){toast('সব তথ্য দাও','err');return;}
  const r=await api('/api/users/add','POST',{name,username,password,role});
  if(r.ok){document.getElementById('userModal').classList.remove('open');toast('User যোগ হয়েছে!');renderUsers();}
  else toast(r.error||'ভুল হয়েছে','err');
}

async function deleteUser(id) {
  if(!confirm('এই user বাদ দেবে?'))return;
  const r=await api('/api/users/delete','POST',{id});
  if(r.ok){toast('User বাদ দেওয়া হয়েছে।');renderUsers();}
  else toast(r.error,'err');
}

async function resetUserPass(id, name) {
  const np = prompt(`${name}-এর নতুন password দাও:`);
  if(!np) return;
  const r=await api('/api/users/reset-password','POST',{id,newPassword:np});
  if(r.ok) toast('Password reset হয়েছে!'); else toast(r.error,'err');
}

// ── Activity ─────────────────────────────────────────────────
async function renderActivity() {
  const r = await api('/api/activity');
  const logs = r.logs||[];
  document.getElementById('topbarRight').innerHTML='';
  document.getElementById('content').innerHTML=`
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px;">সব Activity (সর্বশেষ ২০টা)</div>
      ${logs.length?logs.map(l=>`
      <div class="activity-item">
        <div class="activity-dot"></div>
        <div>
          <div class="activity-text"><strong>${l.name}</strong> — ${l.action}${l.detail?' ('+l.detail+')':''}</div>
          <div class="activity-time">${new Date(l.timestamp).toLocaleString('bn-BD')}</div>
        </div>
      </div>`).join(''):'<div style="text-align:center;padding:30px;color:var(--muted);">কোনো activity নেই।</div>'}
    </div>`;
}

// ── Settings ──────────────────────────────────────────────────

  document.getElementById('content').innerHTML=`
    <div style="max-width:560px;">
      <div class="settings-section">
        <div class="settings-title">Password Change</div>
        <div class="card">
          <div style="margin-bottom:12px;"><label class="field-label">পুরানো Password</label><input class="field-input" id="s-old" type="password" placeholder="পুরানো password"></div>
          <div style="margin-bottom:12px;"><label class="field-label">নতুন Password</label><input class="field-input" id="s-new" type="password" placeholder="নতুন password (কমপক্ষে ৪ অক্ষর)"></div>

      </div>
      <div class="settings-section">
        <div class="settings-title">Danger Zone</div>

          <div class="settings-row">
            <div><div class="settings-row-label">Logout</div><div style="font-size:12px;color:var(--muted)">সব device থেকে logout করো</div></div>
            <button class="btn btn-danger" onclick="doLogout()">Logout করো</button>

async function changePassword() {
  const old=document.getElementById('s-old').value.trim();
  const nw=document.getElementById('s-new').value.trim();
  const cf=document.getElementById('s-confirm').value.trim();
  if(!old||!nw||!cf){toast('সব field পূরণ করো','err');return;}
  if(nw!==cf){toast('নতুন password দুটো মিলছে না!','err');return;}
  const r=await api('/api/change-password','POST',{oldPassword:old,newPassword:nw});
  if(r.ok){document.getElementById('s-old').value='';document.getElementById('s-new').value='';document.getElementById('s-confirm').value='';toast('Password সফলভাবে বদলানো হয়েছে!');}
  else toast(r.error||'ভুল হয়েছে','err');
}
